name: Harness Consistency Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  harness-check:
    name: Kit Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify done features have passing review
        run: |
          failed=0
          for status_file in artifacts/features/*/status.md; do
            [ -f "$status_file" ] || continue
            if grep -q "Done" "$status_file"; then
              slug=$(basename "$(dirname "$status_file")")
              review_file="artifacts/features/$slug/review.md"
              if [ ! -f "$review_file" ]; then
                echo "ERROR: $slug is marked Done but has no review.md" >&2
                failed=1
              elif ! grep -qi "verdict.*pass\|pass.*verdict\|\*\*PASS\*\*\|Verdict: Pass" "$review_file"; then
                echo "ERROR: $slug review.md does not contain a passing verdict" >&2
                failed=1
              fi
            fi
          done
          exit $failed

      - name: Verify manifest source files exist
        run: |
          if [ ! -f "kit/manifest.json" ]; then
            echo "Skipping manifest check: not in kit source repository"
            exit 0
          fi
          failed=0
          # Check every file listed in manifest.json files.overwrite and files.copyIfMissing
          python3 - <<'PY'
          import json, os, sys, glob
          root = os.path.dirname(os.path.abspath("kit/manifest.json"))
          manifest = json.load(open("kit/manifest.json"))
          errors = []
          for pattern in manifest["files"]["overwrite"]:
              full_pattern = os.path.join("kit", pattern)
              if "**" in pattern:
                  base = full_pattern.split("/**")[0]
                  if not os.path.isdir(base):
                      errors.append(f"MISSING overwrite source dir: {base}")
              elif "*" in pattern:
                  matches = glob.glob(full_pattern)
                  if not matches:
                      errors.append(f"MISSING overwrite source (no glob matches): {full_pattern}")
              else:
                  if not os.path.exists(os.path.join("kit", pattern)):
                      errors.append(f"MISSING overwrite source: kit/{pattern}")
          for rel in manifest["files"]["copyIfMissing"]:
              tpl = manifest.get("templateMap", {}).get(rel)
              if tpl:
                  src = os.path.join("kit", tpl)
                  if not os.path.exists(src):
                      errors.append(f"MISSING templateMap source: kit/{tpl} (for {rel})")
              else:
                  if not os.path.exists(os.path.join("kit", rel)):
                      errors.append(f"MISSING copyIfMissing source: kit/{rel}")
          for e in errors:
              print("ERROR:", e, file=sys.stderr)
          sys.exit(1 if errors else 0)
          PY

      - name: Check for stale command name references
        run: |
          # Flag bare "/spec " references (old pre-taxonomy command) in docs and skill files
          failed=0
          if grep -rn --include="*.md" '/spec [a-z]' kit/docs/ kit/skills/ documents/ 2>/dev/null | grep -v 'spec-' | grep -v 'spec_' | grep -v '#' | grep -q .; then
            echo "WARNING: possible stale bare '/spec' command reference found (should be '/spec-requirements', '/spec-plan', etc.)" >&2
            grep -rn --include="*.md" '/spec [a-z]' kit/docs/ kit/skills/ documents/ 2>/dev/null | grep -v 'spec-' | grep -v 'spec_' | grep -v '#' >&2 || true
          fi
          # Non-fatal: warn only
          exit 0

      - name: Check VERSION and manifest.json version are in sync
        run: |
          if [ ! -f "kit/manifest.json" ] || [ ! -f "kit/VERSION" ]; then
            echo "Skipping version sync check: not in kit source repository"
            exit 0
          fi
          kit_version=$(tr -d '[:space:]' < kit/VERSION)
          manifest_version=$(python3 -c "import json; print(json.load(open('kit/manifest.json'))['version'])")
          if [ "$kit_version" != "$manifest_version" ]; then
            echo "ERROR: kit/VERSION ($kit_version) does not match kit/manifest.json version ($manifest_version)" >&2
            exit 1
          fi
          echo "VERSION and manifest.json are in sync: $kit_version"

      - name: Verify every skills/ subdirectory has a SKILL.md
        run: |
          if [ ! -d "kit/skills" ]; then
            echo "Skipping skill files check: not in kit source repository"
            exit 0
          fi
          failed=0
          for skill_dir in kit/skills/*/; do
            skill_name=$(basename "$skill_dir")
            [ "$skill_name" = "_shared" ] && continue
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "ERROR: skills/$skill_name/ is missing SKILL.md" >&2
              failed=1
            fi
          done
          exit $failed

