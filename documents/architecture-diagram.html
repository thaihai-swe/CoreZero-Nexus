<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreZero — System Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #020617;
      --grid: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --toolbar-bg: rgba(15, 23, 42, 0.9);
      --fe-fill: rgba(8, 51, 68, 0.4);
      --fe-stroke: #22d3ee;
      --be-fill: rgba(6, 78, 59, 0.4);
      --be-stroke: #34d399;
      --db-fill: rgba(76, 29, 149, 0.4);
      --db-stroke: #a78bfa;
      --cloud-fill: rgba(120, 53, 15, 0.3);
      --cloud-stroke: #fbbf24;
      --sec-fill: rgba(136, 19, 55, 0.4);
      --sec-stroke: #fb7185;
      --bus-fill: rgba(251, 146, 60, 0.3);
      --bus-stroke: #fb923c;
      --ext-fill: rgba(30, 41, 59, 0.5);
      --ext-stroke: #94a3b8;
      --fe-region-fill: rgba(8, 51, 68, 0.05);
      --be-region-fill: rgba(6, 78, 59, 0.04);
      --db-region-fill: rgba(76, 29, 149, 0.05);
      --cloud-region-fill: rgba(120, 53, 15, 0.07);
      --ext-region-fill: rgba(30, 41, 59, 0.06);
      --arrow-color: #64748b;
      --arrow-rose: #fb7185;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --grid: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --toolbar-bg: rgba(241, 245, 249, 0.95);
      --fe-fill: rgba(207, 250, 254, 0.6);
      --fe-stroke: #0891b2;
      --be-fill: rgba(209, 250, 229, 0.6);
      --be-stroke: #059669;
      --db-fill: rgba(237, 233, 254, 0.6);
      --db-stroke: #7c3aed;
      --cloud-fill: rgba(254, 243, 199, 0.6);
      --cloud-stroke: #d97706;
      --sec-fill: rgba(255, 228, 230, 0.6);
      --sec-stroke: #e11d48;
      --bus-fill: rgba(255, 237, 213, 0.6);
      --bus-stroke: #ea580c;
      --ext-fill: rgba(241, 245, 249, 0.6);
      --ext-stroke: #64748b;
      --fe-region-fill: rgba(207, 250, 254, 0.1);
      --be-region-fill: rgba(209, 250, 229, 0.1);
      --db-region-fill: rgba(237, 233, 254, 0.1);
      --cloud-region-fill: rgba(254, 243, 199, 0.1);
      --ext-region-fill: rgba(241, 245, 249, 0.1);
      --arrow-color: #475569;
      --arrow-rose: #e11d48;
    }

    /* Blueprint Preset Overrides */
    :root[data-style="blueprint"] {
      --bg: #0b2545;
      --grid: #134074;
      --text-primary: #ffffff;
      --text-secondary: #8da9c4;
      --border: #134074;
      --toolbar-bg: rgba(11, 37, 69, 0.9);
      --fe-fill: rgba(255, 255, 255, 0.05);
      --fe-stroke: #ffffff;
      --be-fill: rgba(255, 255, 255, 0.05);
      --be-stroke: #ffffff;
      --db-fill: rgba(255, 255, 255, 0.05);
      --db-stroke: #ffffff;
      --cloud-fill: rgba(255, 255, 255, 0.05);
      --cloud-stroke: #ffffff;
      --sec-fill: rgba(255, 255, 255, 0.05);
      --sec-stroke: #ffffff;
      --bus-fill: rgba(255, 255, 255, 0.05);
      --bus-stroke: #ffffff;
      --ext-fill: rgba(255, 255, 255, 0.05);
      --ext-stroke: #ffffff;
      --fe-region-fill: transparent;
      --be-region-fill: transparent;
      --db-region-fill: transparent;
      --cloud-region-fill: transparent;
      --ext-region-fill: transparent;
      --arrow-color: #ffffff;
      --arrow-rose: #ffffff;
    }

    /* Notion Minimal Preset Overrides */
    :root[data-style="notion"][data-theme="light"] {
      --bg: #ffffff;
      --grid: #f1f1f1;
      --text-primary: #37352f;
      --text-secondary: #787774;
      --border: #dfdfde;
      --toolbar-bg: rgba(255, 255, 255, 0.95);
      --fe-fill: #f2f1ee;
      --fe-stroke: #37352f;
      --be-fill: #f2f1ee;
      --be-stroke: #37352f;
      --db-fill: #f2f1ee;
      --db-stroke: #37352f;
      --cloud-fill: #f2f1ee;
      --cloud-stroke: #37352f;
      --sec-fill: #f2f1ee;
      --sec-stroke: #37352f;
      --bus-fill: #f2f1ee;
      --bus-stroke: #37352f;
      --ext-fill: #f2f1ee;
      --ext-stroke: #37352f;
      --fe-region-fill: transparent;
      --be-region-fill: transparent;
      --db-region-fill: transparent;
      --cloud-region-fill: transparent;
      --ext-region-fill: transparent;
      --arrow-color: #37352f;
      --arrow-rose: #37352f;
    }

    :root[data-style="notion"][data-theme="dark"] {
      --bg: #191919;
      --grid: #2c2c2c;
      --text-primary: #ffffff;
      --text-secondary: #9b9b9b;
      --border: #2c2c2c;
      --toolbar-bg: rgba(25, 25, 25, 0.9);
      --fe-fill: #252525;
      --fe-stroke: #ffffff;
      --be-fill: #252525;
      --be-stroke: #ffffff;
      --db-fill: #252525;
      --db-stroke: #ffffff;
      --cloud-fill: #252525;
      --cloud-stroke: #ffffff;
      --sec-fill: #252525;
      --sec-stroke: #ffffff;
      --bus-fill: #252525;
      --bus-stroke: #ffffff;
      --ext-fill: #252525;
      --ext-stroke: #ffffff;
      --fe-region-fill: transparent;
      --be-region-fill: transparent;
      --db-region-fill: transparent;
      --cloud-region-fill: transparent;
      --ext-region-fill: transparent;
      --arrow-color: #ffffff;
      --arrow-rose: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 100;
      background: var(--toolbar-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      backdrop-filter: blur(8px);
    }

    .toolbar button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .toolbar button:hover {
      background: var(--border);
    }

    .export-wrap {
      position: relative;
    }

    .export-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--toolbar-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      min-width: 180px;
      backdrop-filter: blur(8px);
      z-index: 200;
    }

    .export-menu.open {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .export-menu button {
      width: 100%;
      text-align: left;
    }

    .diagram-wrapper {
      padding: 32px 24px;
      width: 100%;
      max-width: 1800px;
    }

    h1.diagram-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    p.diagram-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    svg {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button id="btn-theme" title="Toggle theme (T)">🌙 Dark</button>
    <button id="btn-style" title="Cycle style presets (S)">🎨 Style: Default</button>
    <div class="export-wrap">
      <button id="btn-export" title="Export (E)">⬇ Export</button>
      <div class="export-menu" id="export-menu">
        <button id="exp-copy">📋 Copy PNG</button>
        <button id="exp-png">⬇ PNG (4×)</button>
        <button id="exp-jpeg">⬇ JPEG (4×)</button>
        <button id="exp-webp">⬇ WebP (4×)</button>
        <button id="exp-svg">⬇ SVG (dual-theme)</button>
      </div>
    </div>
  </div>

  <div class="diagram-wrapper">
    <h1 class="diagram-title">CoreZero</h1>
    <p class="diagram-subtitle">AI-assisted software delivery framework · Spec-anchored agent workflow · Shipped
      installer architecture</p>

    <svg id="diagram" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="0.5" />
        </pattern>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow-color)" />
        </marker>
        <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow-rose)" />
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="var(--bg)" />
      <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- ═══════════════════════════════════════════════════════════
           STEP 1: All connection lines drawn first (painter's order)
           ═══════════════════════════════════════════════════════════ -->
      <!-- Dev User to Agent -->
      <line x1="200" y1="140" x2="230" y2="140" stroke="var(--arrow-color)" stroke-width="1.5"
        marker-end="url(#arrowhead)" />

      <!-- Agent to Routing index -->
      <line x1="230" y1="280" x2="230" y2="380" stroke="var(--fe-stroke)" stroke-width="1.5"
        marker-end="url(#arrowhead)" />

      <!-- Routing index dispatch to Skills (spine line) -->
      <line x1="300" y1="420" x2="440" y2="420" stroke="var(--be-stroke)" stroke-width="1.5"
        marker-end="url(#arrowhead)" />

      <!-- Spec skills writes specs -->
      <line x1="660" y1="220" x2="980" y2="220" stroke="var(--fe-stroke)" stroke-width="1.2" stroke-dasharray="4,2"
        marker-end="url(#arrowhead)" />

      <!-- Harness verify checks and writes review.md -->
      <line x1="880" y1="150" x2="1210" y2="150" stroke="var(--be-stroke)" stroke-width="1.2" stroke-dasharray="4,2"
        marker-end="url(#arrowhead)" />

      <!-- Context skills extract feature updates -->
      <line x1="660" y1="670" x2="980" y2="670" stroke="var(--db-stroke)" stroke-width="1.2" stroke-dasharray="3,3"
        marker-end="url(#arrowhead)" />

      <!-- Context Memory promotes extracts to Instruction memory -->
      <line x1="1210" y1="920" x2="1210" y2="680" stroke="var(--arrow-rose)" stroke-width="1.5" stroke-dasharray="4,3"
        marker-end="url(#arrowhead-rose)" />

      <!-- Agent reads dynamic instruction memory context -->
      <path d="M 980 630 L 290 630 L 290 320" fill="none" stroke="var(--arrow-rose)" stroke-width="1.5"
        stroke-dasharray="5,4" marker-end="url(#arrowhead-rose)" />

      <!-- Installer script creates shipped kit/ -->
      <line x1="200" y1="600" x2="1520" y2="300" stroke="var(--cloud-stroke)" stroke-width="1.5"
        marker-end="url(#arrowhead)" />

      <!-- kit/ gets imported by adopter repo -->
      <line x1="1690" y1="480" x2="1690" y2="520" stroke="var(--cloud-stroke)" stroke-width="1.5"
        marker-end="url(#arrowhead)" />


      <!-- ═══════════════════════════════════════════════════════════
           STEP 2: Component Regions and Boxes
           ═══════════════════════════════════════════════════════════ -->

      <!-- ─── REGION: entry and developer surface ─── -->
      <rect x="40" y="30" width="340" height="1000" rx="12" fill="var(--ext-region-fill)" stroke="var(--ext-stroke)"
        stroke-width="1" stroke-dasharray="8,4" />
      <text x="210" y="55" fill="var(--text-primary)" font-size="10" font-weight="700" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" letter-spacing="1">DEVELOPER SURFACE</text>

      <!-- Dev User -->
      <g>
        <rect x="60" y="100" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="60" y="100" width="140" height="80" rx="6" fill="var(--ext-fill)" stroke="var(--ext-stroke)"
          stroke-width="1.5" />
        <text x="130" y="136" fill="var(--text-primary)" font-size="12" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">👤 Developer</text>
        <text x="130" y="156" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Commands and Intents</text>
      </g>

      <!-- AI Agent Hexagon -->
      <g>
        <polygon points="300,140 350,110 350,170 300,200 250,170 250,110" fill="var(--bg)" />
        <polygon points="300,140 350,110 350,170 300,200 250,170 250,110" fill="var(--fe-fill)"
          stroke="var(--fe-stroke)" stroke-width="1.5" />
        <text x="300" y="154" fill="var(--fe-stroke)" font-size="11" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">🤖 Agent</text>
      </g>

      <!-- Master Index.md -->
      <g>
        <rect x="160" y="240" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="160" y="240" width="140" height="80" rx="6" fill="var(--be-fill)" stroke="var(--be-stroke)"
          stroke-width="1.5" />
        <text x="230" y="276" fill="var(--be-stroke)" font-size="12" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">MASTER_INDEX.md</text>
        <text x="230" y="296" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Master Router</text>
      </g>

      <!-- AGENTS.md entrypoint -->
      <g>
        <rect x="60" y="380" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="60" y="380" width="140" height="80" rx="6" fill="var(--be-fill)" stroke="var(--be-stroke)"
          stroke-width="1.5" />
        <text x="130" y="416" fill="var(--be-stroke)" font-size="12" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">AGENTS.md</text>
        <text x="130" y="436" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Root Instruction</text>
      </g>

      <!-- Installer install.sh -->
      <g>
        <rect x="60" y="560" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="60" y="560" width="140" height="80" rx="6" fill="var(--cloud-fill)" stroke="var(--cloud-stroke)"
          stroke-width="1.5" />
        <text x="130" y="596" fill="var(--cloud-stroke)" font-size="12" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">install.sh</text>
        <text x="130" y="616" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Install Script</text>
      </g>

      <!-- Manifest.json -->
      <g>
        <rect x="60" y="700" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="60" y="700" width="140" height="80" rx="6" fill="var(--cloud-fill)" stroke="var(--cloud-stroke)"
          stroke-width="1.5" />
        <text x="130" y="736" fill="var(--cloud-stroke)" font-size="12" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">manifest.json</text>
        <text x="130" y="756" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Package Manifest</text>
      </g>

      <!-- core-policies.md -->
      <g>
        <rect x="60" y="840" width="140" height="80" rx="6" fill="var(--bg)" />
        <rect x="60" y="840" width="140" height="80" rx="6" fill="var(--be-fill)" stroke="var(--be-stroke)"
          stroke-width="1.5" />
        <text x="130" y="876" fill="var(--be-stroke)" font-size="11" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">core-policies.md</text>
        <text x="130" y="896" fill="var(--text-secondary)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">Constitution & Config</text>
      </g>


      <!-- ─── REGION: Kit Skills ─── -->
      <rect x="420" y="30" width="500" height="1000" rx="12" fill="var(--be-region-fill)" stroke="var(--be-stroke)"
        stroke-width="1" stroke-dasharray="8,4" />
      <text x="670" y="55" fill="var(--text-primary)" font-size="10" font-weight="700" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" letter-spacing="1">SHIPPED KIT SKILLS (kit/skills/)</text>

      <!-- Sub-region: Spec skills -->
      <g>
        <rect x="440" y="80" width="220" height="420" rx="8" fill="var(--bg)" stroke="var(--fe-stroke)"
          stroke-width="0.75" stroke-dasharray="4,4" />
        <text x="550" y="105" fill="var(--fe-stroke)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">SPEC SKILLS</text>

        <!-- spec-research -->
        <rect x="460" y="120" width="180" height="50" rx="5" fill="var(--bg)" />
        <rect x="460" y="120" width="180" height="50" rx="5" fill="var(--fe-fill)" stroke="var(--fe-stroke)"
          stroke-width="1.2" />
        <text x="550" y="148" fill="var(--fe-stroke)" font-size="10" font-weight="600" text-anchor="middle"

        <!-- spec-requirements -->
        <rect x="460" y="190" width="180" height="50" rx="5" fill="var(--bg)" />
        <rect x="460" y="190" width="180" height="50" rx="5" fill="var(--fe-fill)" stroke="var(--fe-stroke)"

        <text x="550" y="218" fill="var(--fe-stroke)" font-size="10" font-weight="600" text-anchor="middle"

        <!-- spec-adr -->
        <rect x="460" y="260" width="180" height="50" rx="5" fill="var(--bg)" />
        <rect x="460" y="260" width="180" height="50" rx="5" fill="var(--fe-fill)" stroke="var(--fe-stroke)"

        <text x="550" y="288" fill="var(--fe-stroke)" font-size="10" font-weight="600" text-anchor="middle"

        <!-- spec-plan -->
        <rect x="460" y="330" width="180" height="50" rx="5" fill="var(--bg)" />

        <!-- spec-implement -->
        <rect x="460" y="400" width="180" height="50" rx="5" fill="var(--bg)" />
        <rect x="460" y="400" width="180" height="50" rx="5" fill="var(--fe-fill)" stroke="var(--fe-stroke)"

        <text x="550" y="428" fill="var(--fe-stroke)" font-size="10" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">/spec-implement</text>
      </g>

      <!-- Sub-region: Harness skills -->
      <g>
        <rect x="680" y="80" width="220" height="420" rx="8" fill="var(--bg)" stroke="var(--be-stroke)"
          stroke-width="0.75" stroke-dasharray="4,4" />
        <text x="790" y="105" fill="var(--be-stroke)" font-size="9" text-anchor="middle"

        <!-- harness-verify -->
        <rect x="700" y="130" width="180" height="60" rx="5" fill="var(--bg)" />
        <rect x="700" y="130" width="180" height="60" rx="5" fill="var(--be-fill)" stroke="var(--be-stroke)"

          font-family="'JetBrains Mono', monospace">/harness-verify</text>
        <text x="790" y="176" fill="var(--text-secondary)" font-size="8" text-anchor="middle"

        <!-- harness-maintain -->
        <rect x="700" y="240" width="180" height="60" rx="5" fill="var(--bg)" />
        <rect x="700" y="240" width="180" height="60" rx="5" fill="var(--be-fill)" stroke="var(--be-stroke)"

        <text x="790" y="270" fill="var(--be-stroke)" font-size="10" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">/harness-maintain</text>
        <text x="790" y="286" fill="var(--text-secondary)" font-size="8" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">telemetry eval loops</text>
      </g>

      <!-- Sub-region: Context skills -->
      <g>
        <rect x="440" y="530" width="220" height="520" rx="8" fill="var(--bg)" stroke="var(--db-stroke)"
          stroke-width="0.75" stroke-dasharray="4,4" />
        <text x="550" y="555" fill="var(--db-stroke)" font-size="9" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">CONTEXT SKILLS</text>

        <!-- context-session -->
        <rect x="460" y="580" width="180" height="60" rx="5" fill="var(--bg)" />
        <rect x="460" y="580" width="180" height="60" rx="5" fill="var(--db-fill)" stroke="var(--db-stroke)"
          stroke-width="1.2" />
        <text x="550" y="610" fill="var(--db-stroke)" font-size="10" font-weight="600" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">/context-session</text>
        <text x="550" y="626" fill="var(--text-secondary)" font-size="8" text-anchor="middle"

  <script>
    (() => {
      const root = document.documentElement;
      const btnTheme = document.getElementById('btn-theme');
      const btnStyle = document.getElementById('btn-style');

      // Theme logic
      const savedTheme = localStorage.getItem('arch-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let theme = savedTheme || (prefersDark ? 'dark' : 'light');

      function applyTheme(t) {
        theme = t;
        root.setAttribute('data-theme', t);
        btnTheme.textContent = t === 'dark' ? '☀ Light' : '🌙 Dark';
        localStorage.setItem('arch-theme', t);
      }
      applyTheme(theme);
      btnTheme.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

      // Style logic
      const savedStyle = localStorage.getItem('arch-style') || 'default';
      let currentStyle = savedStyle;

      function applyStyle(s) {
        currentStyle = s;
        if (s === 'default') {
          root.removeAttribute('data-style');
        } else {
          root.setAttribute('data-style', s);
        }
        btnStyle.textContent = `🎨 Style: ${s.charAt(0).toUpperCase() + s.slice(1)}`;
        localStorage.setItem('arch-style', s);
      }
      applyStyle(currentStyle);

      const stylesList = ['default', 'blueprint', 'notion'];
      btnStyle.addEventListener('click', () => {
        const idx = stylesList.indexOf(currentStyle);
        const nextStyle = stylesList[(idx + 1) % stylesList.length];
        applyStyle(nextStyle);
      });

      const btnExport = document.getElementById('btn-export');
      const exportMenu = document.getElementById('export-menu');
      btnExport.addEventListener('click', e => { e.stopPropagation(); exportMenu.classList.toggle('open'); });
      document.addEventListener('click', () => exportMenu.classList.remove('open'));

      const svgEl = document.getElementById('diagram');
      const SCALE = 4;
      const TITLE = (document.querySelector('h1.diagram-title')?.textContent || 'diagram').trim().replace(/\s+/g, '-');

      function svgToPng(scale, format) {
        return new Promise(resolve => {
          const clone = svgEl.cloneNode(true);
          const [, , w, h] = svgEl.getAttribute('viewBox').split(' ').map(Number);
          clone.setAttribute('width', w * scale);
          clone.setAttribute('height', h * scale);
          const cs = getComputedStyle(root);
          const vars = ['--bg', '--grid', '--text-primary', '--text-secondary', '--border'];
          const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
          styleEl.textContent = `:root{${vars.map(v => `${v}:${cs.getPropertyValue(v).trim()}`).join(';')}}`;
          clone.prepend(styleEl);
          const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = w * scale; canvas.height = h * scale;
            canvas.getContext('2d').drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            const mime = { jpeg: 'image/jpeg', webp: 'image/webp' }[format] || 'image/png';
            canvas.toBlob(resolve, mime, 0.95);
          };
          img.src = url;
        });
      }

      function dl(blob, name) {
        const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: name });
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }

      document.getElementById('exp-copy').addEventListener('click', async () => {
        const blob = await svgToPng(2, 'png');
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      });
      document.getElementById('exp-png').addEventListener('click', async () => dl(await svgToPng(SCALE, 'png'), `${TITLE}.png`));
      document.getElementById('exp-jpeg').addEventListener('click', async () => dl(await svgToPng(SCALE, 'jpeg'), `${TITLE}.jpg`));
      document.getElementById('exp-webp').addEventListener('click', async () => dl(await svgToPng(SCALE, 'webp'), `${TITLE}.webp`));
      document.getElementById('exp-svg').addEventListener('click', () => {
        const clone = svgEl.cloneNode(true);
        const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
        const cssDark = [
          '--bg:#020617;--grid:#1e293b;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;',
          '--fe-fill:rgba(8,51,68,0.4);--fe-stroke:#22d3ee;',
          '--be-fill:rgba(6,78,59,0.4);--be-stroke:#34d399;',
          '--db-fill:rgba(76,29,149,0.4);--db-stroke:#a78bfa;',
          '--cloud-fill:rgba(120,53,15,0.3);--cloud-stroke:#fbbf24;',
          '--sec-fill:rgba(136,19,55,0.4);--sec-stroke:#fb7185;',
          '--bus-fill:rgba(251,146,60,0.3);--bus-stroke:#fb923c;',
          '--ext-fill:rgba(30,41,59,0.5);--ext-stroke:#94a3b8;',
          '--fe-region-fill:rgba(8,51,68,0.05);--be-region-fill:rgba(6,78,59,0.04);',
          '--db-region-fill:rgba(76,29,149,0.05);--cloud-region-fill:rgba(120,53,15,0.07);',
          '--ext-region-fill:rgba(30,41,59,0.06);',
          '--arrow-color:#64748b;--arrow-rose:#fb7185;'
        ].join('');
        const cssLight = [
          '--bg:#f8fafc;--grid:#cbd5e1;--text-primary:#0f172a;--text-secondary:#64748b;--border:#e2e8f0;',
          '--fe-fill:rgba(207,250,254,0.6);--fe-stroke:#0891b2;',
          '--be-fill:rgba(209,250,229,0.6);--be-stroke:#059669;',
          '--db-fill:rgba(237,233,254,0.6);--db-stroke:#7c3aed;',
          '--cloud-fill:rgba(254,243,199,0.6);--cloud-stroke:#d97706;',
          '--sec-fill:rgba(255,228,230,0.6);--sec-stroke:#e11d48;',
          '--bus-fill:rgba(255,237,213,0.6);--bus-stroke:#ea580c;',
          '--ext-fill:rgba(241,245,249,0.6);--ext-stroke:#64748b;',
          '--fe-region-fill:rgba(207,250,254,0.1);--be-region-fill:rgba(209,250,229,0.1);',
          '--db-region-fill:rgba(237,233,254,0.1);--cloud-region-fill:rgba(254,243,199,0.1);',
          '--ext-region-fill:rgba(241,245,249,0.1);',
          '--arrow-color:#475569;--arrow-rose:#e11d48;'
        ].join('');
        style.textContent = [
          `:root{${cssDark}}`,
          `@media(prefers-color-scheme:light){:root{${cssLight}}}`
        ].join('');
        clone.prepend(style);
        dl(new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml' }), `${TITLE}.svg`);
      });

      document.addEventListener('keydown', e => {
        if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
        if (e.key === 't' || e.key === 'T') applyTheme(theme === 'dark' ? 'light' : 'dark');
        if (e.key === 's' || e.key === 'S') {
          const idx = stylesList.indexOf(currentStyle);
          const nextStyle = stylesList[(idx + 1) % stylesList.length];
          applyStyle(nextStyle);
        }
        if (e.key === 'e' || e.key === 'E') exportMenu.classList.toggle('open');
      });
    })();
  </script>
</body>

</html>
