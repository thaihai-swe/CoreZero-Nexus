name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#v}"
          python3 - "$tag" <<'PY'
          import json
          import sys
          from pathlib import Path

          tag = sys.argv[1]
          manifest_version = json.loads(Path("kit/manifest.json").read_text(encoding="utf-8"))["version"]

          if manifest_version != tag:
              raise SystemExit(f"ERROR: tag v{tag} does not match manifest.json version {manifest_version}")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
