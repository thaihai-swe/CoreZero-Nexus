name: Deploy GitHub Pages

on:
  push:
    branches: [main]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Copy docs to site directory
        run: |
          mkdir -p _site
          mkdir -p _site/adopters _site/maintainers
          cp -R kit/docs/* _site/adopters/
          cp -R page-document/* _site/
          cp documents/README.md _site/maintainers/
          cp documents/architecture.md _site/maintainers/
          cp documents/TEMPLATE_SURFACE.md _site/maintainers/
          cp documents/INSTALL.md _site/maintainers/
          cp documents/skills-guide.md _site/maintainers/
          cp documents/releasing.md _site/maintainers/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
